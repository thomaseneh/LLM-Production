services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: toms-ai-backend

    env_file:
      - .env

    expose:
      - "8000"

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - toms-ai-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""

    container_name: toms-ai-frontend

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - toms-ai-network

networks:
  toms-ai-network:
    driver: bridge